providers = ["python"]

[phases.setup]
nixPkgs = ["python311Full"]

[phases.install]
cmds = [
  "python -m venv /app/venv",
  ". /app/venv/bin/activate",
  "pip install --upgrade pip setuptools wheel",
  "pip install -r requirements.txt"
]

[start]
cmd = ". /app/venv/bin/activate && python server.py"

